appId: com.saucelabs.mydemoapp.android
name: "TC-AND-004: Password field shows error when left empty"
tags:
  - android
  - auth
  - validation
env:
  ANDROID_EMAIL: ${ANDROID_EMAIL}
onFlowStart:
  - takeScreenshot: TC-AND-004_start
onFlowComplete:
  - takeScreenshot: TC-AND-004_complete
---
- launchApp:
    clearState: true

- runFlow:
    file: ../subflows/login/navigate.yaml
    env:
      APP_ID: com.saucelabs.mydemoapp.android

# Type username, leave password empty
- tapOn:
    id: "nameET"

- inputText: ${ANDROID_EMAIL}

- hideKeyboard

- tapOn:
    id: "loginBtn"

- extendedWaitUntil:
    visible:
      text: "Enter Password"
    timeout: 5000
