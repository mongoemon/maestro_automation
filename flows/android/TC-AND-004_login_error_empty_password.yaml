appId: com.saucelabs.mydemoapp.android
name: "TC-AND-004: Password field shows error when left empty"
tags:
  - android
  - auth
  - validation
env:
  EMAIL: ${ANDROID_EMAIL}
onFlowStart:
  - takeScreenshot: TC-AND-004_start
onFlowComplete:
  - takeScreenshot: TC-AND-004_complete
---
# TC-AND-004: Password field shows error when left empty
# Precondition: App is installed. User is on the Login screen.
# Test data: email=bod@example.com, password=(empty)
# Expected: "Password is required" error is displayed.

- launchApp:
    clearState: true

- waitForAnimationToEnd

- runFlow:
    file: ../subflows/navigate_to_login.yaml
    env:
      APP_ID: com.saucelabs.mydemoapp.android

# Tap the username input field by resource ID and enter email
- tapOn:
    id: "nameET"

- inputText: ${ANDROID_EMAIL}

- hideKeyboard

# Tap the Login button — leave password empty
- tapOn:
    id: "loginBtn"

# Assert: Password error message is displayed
- extendedWaitUntil:
    visible:
      text: "Enter Password"
    timeout: 5000
