appId: com.saucelabs.mydemoapp.android
name: "TC-AND-002: Products list is shown after login"
tags:
  - android
  - auth
  - smoke
env:
  ANDROID_EMAIL: ${ANDROID_EMAIL}
  PASSWORD: ${PASSWORD}
onFlowStart:
  - takeScreenshot: TC-AND-002_start
onFlowComplete:
  - takeScreenshot: TC-AND-002_complete
---
- launchApp:
    clearState: true

- runFlow:
    file: ../subflows/login/login.yaml
    env:
      APP_ID: com.saucelabs.mydemoapp.android
      ANDROID_EMAIL: ${ANDROID_EMAIL}
      PASSWORD: ${PASSWORD}

- runFlow:
    file: ../subflows/products/assert_loaded.yaml
    env:
      APP_ID: com.saucelabs.mydemoapp.android

- assertVisible:
    text: "Sauce Labs Bike Light"
    optional: true
