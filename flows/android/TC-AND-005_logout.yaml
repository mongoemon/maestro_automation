appId: com.saucelabs.mydemoapp.android
name: "TC-AND-005: Logout returns Login option to menu"
tags:
  - android
  - auth
  - smoke
env:
  ANDROID_EMAIL: ${ANDROID_EMAIL}
  PASSWORD: ${PASSWORD}
onFlowStart:
  - takeScreenshot: TC-AND-005_start
onFlowComplete:
  - takeScreenshot: TC-AND-005_complete
---
- launchApp:
    clearState: true

- runFlow:
    file: ../subflows/login/login.yaml
    env:
      APP_ID: com.saucelabs.mydemoapp.android
      ANDROID_EMAIL: ${ANDROID_EMAIL}
      PASSWORD: ${PASSWORD}

- runFlow:
    file: ../subflows/products/assert_loaded.yaml
    env:
      APP_ID: com.saucelabs.mydemoapp.android

- takeScreenshot: TC-AND-005_after_login

- runFlow:
    file: ../subflows/drawer/logout.yaml
    env:
      APP_ID: com.saucelabs.mydemoapp.android

- takeScreenshot: TC-AND-005_after_logout

- extendedWaitUntil:
    visible:
      text: "Username"
    timeout: 5000
