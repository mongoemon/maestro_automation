appId: com.saucelabs.mydemo.app.ios
name: "TC-IOS-002: Products list is shown after login"
tags:
  - ios
  - auth
  - smoke
env:
  IOS_EMAIL: ${IOS_EMAIL}
  PASSWORD: ${PASSWORD}
onFlowStart:
  - takeScreenshot: TC-IOS-002_start
onFlowComplete:
  - takeScreenshot: TC-IOS-002_complete
---
- launchApp:
    clearState: true

- runFlow:
    file: ./subflows/login/login.yaml
    env:
      APP_ID: com.saucelabs.mydemo.app.ios
      IOS_EMAIL: ${IOS_EMAIL}
      PASSWORD: ${PASSWORD}

- runFlow:
    file: ./subflows/products/assert_loaded.yaml
    env:
      APP_ID: com.saucelabs.mydemo.app.ios

- assertVisible:
    text: "Sauce Labs Bike Light"
    optional: true
