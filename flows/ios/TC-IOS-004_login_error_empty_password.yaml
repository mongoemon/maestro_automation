appId: com.saucelabs.mydemo.app.ios
name: "TC-IOS-004: Password field shows error when left empty"
tags:
  - ios
  - auth
  - validation
env:
  EMAIL: ${EMAIL}
onFlowStart:
  - takeScreenshot: TC-IOS-004_start
onFlowComplete:
  - takeScreenshot: TC-IOS-004_complete
---
# TC-IOS-004: Password field shows error when left empty
# Precondition: App is installed. User is on the Login screen.
# Test data: email=bod@example.com, password=(empty)
# Expected: "Password is required" error is displayed.

- launchApp:
    clearState: true

- waitForAnimationToEnd

- runFlow:
    file: ../subflows/navigate_to_login.yaml
    env:
      APP_ID: com.saucelabs.mydemo.app.ios

# Tap the Username field (below the "Username" label) and enter email
- tapOn:
    text: "Username"
    index: 0

- inputText: ${EMAIL}

- hideKeyboard

# Tap the Login button — leave password empty
- tapOn: "Login"

# Assert: Password error message is displayed
- extendedWaitUntil:
    visible:
      text: "Enter Password"
    timeout: 5000
