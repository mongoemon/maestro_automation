appId: com.saucelabs.mydemo.app.ios
name: "TC-IOS-004: Password field shows error when left empty"
tags:
  - ios
  - auth
  - validation
onFlowStart:
  - takeScreenshot: TC-IOS-004_start
onFlowComplete:
  - takeScreenshot: TC-IOS-004_complete
---
# TC-IOS-004: Password field shows error when left empty
# Precondition: App is installed. User is on the Login screen.
# Test data: email=bob@example.com (credential shortcut fills username only), password=(empty)
# Expected: password error is displayed.

- launchApp:
    clearState: true

- waitForAnimationToEnd

- runFlow:
    file: ./subflows/navigate_to_login.yaml
    env:
      APP_ID: com.saucelabs.mydemo.app.ios

# Tap credential shortcut — fills only the username field (password stays empty)
- tapOn: "bob@example.com"

# Tap Login button (index:1 skips the "Login" page title) — password is still empty
- tapOn:
    text: "Login"
    index: 1

# Assert: Password error message is displayed
- extendedWaitUntil:
    visible:
      text: "Password is required"
    timeout: 5000
