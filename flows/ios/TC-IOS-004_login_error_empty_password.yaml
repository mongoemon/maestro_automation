appId: com.saucelabs.mydemo.app.ios
name: "TC-IOS-004: Password field shows error when left empty"
tags:
  - ios
  - auth
  - validation
onFlowStart:
  - takeScreenshot: TC-IOS-004_start
onFlowComplete:
  - takeScreenshot: TC-IOS-004_complete
---
- launchApp:
    clearState: true

- runFlow:
    file: ./subflows/login/navigate.yaml
    env:
      APP_ID: com.saucelabs.mydemo.app.ios

# Credential shortcut fills username only — password stays empty
- tapOn: "bob@example.com"

# Tap the submit button (index 1 skips the "Login" page title)
- tapOn:
    text: "Login"
    index: 1

- extendedWaitUntil:
    visible:
      text: "Password is required"
    timeout: 5000
