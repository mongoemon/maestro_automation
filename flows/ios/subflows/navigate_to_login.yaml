appId: ${APP_ID}
---
# iOS: dismiss system dialogs, open More tab, tap Login entry.
# The login row has accessibility id "Login Button" — text label is not in the a11y tree.

- runFlow:
    file: ../../subflows/common_actions.yaml

- waitForAnimationToEnd

- tapOn:
    id: "More-tab-item"

- waitForAnimationToEnd

- tapOn:
    id: "Login Button"

- waitForAnimationToEnd
