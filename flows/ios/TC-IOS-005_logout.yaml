appId: com.saucelabs.mydemo.app.ios
name: "TC-IOS-005: Logout returns Login option to menu"
tags:
  - ios
  - auth
  - smoke
env:
  IOS_EMAIL: ${IOS_EMAIL}
  PASSWORD: ${PASSWORD}
onFlowStart:
  - takeScreenshot: TC-IOS-005_start
onFlowComplete:
  - takeScreenshot: TC-IOS-005_complete
---
- launchApp:
    clearState: true

- runFlow:
    file: ./subflows/login/login.yaml
    env:
      APP_ID: com.saucelabs.mydemo.app.ios
      IOS_EMAIL: ${IOS_EMAIL}
      PASSWORD: ${PASSWORD}

- runFlow:
    file: ./subflows/products/assert_loaded.yaml
    env:
      APP_ID: com.saucelabs.mydemo.app.ios

- takeScreenshot: TC-IOS-005_after_login

- runFlow:
    file: ./subflows/more_tab/logout.yaml
    env:
      APP_ID: com.saucelabs.mydemo.app.ios

- takeScreenshot: TC-IOS-005_after_logout

# Re-open More tab to verify logout state
- tapOn:
    id: "More-tab-item"

- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: "Login Button"
    timeout: 5000
