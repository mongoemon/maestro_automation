appId: com.saucelabs.mydemo.app.ios
name: "TC-IOS-001: Login with valid credentials"
tags:
  - ios
  - auth
  - smoke
env:
  EMAIL: ${EMAIL}
  PASSWORD: ${PASSWORD}
onFlowStart:
  - takeScreenshot: TC-IOS-001_start
onFlowComplete:
  - takeScreenshot: TC-IOS-001_complete
---
# TC-IOS-001: Login with valid credentials
# Precondition: App is installed. User is on the home screen.
# Expected: Products catalog screen is displayed after login.

- launchApp:
    clearState: true

- waitForAnimationToEnd

- runFlow:
    file: ../subflows/navigate_to_login.yaml
    env:
      APP_ID: com.saucelabs.mydemo.app.ios

- runFlow:
    file: ../subflows/perform_login.yaml
    env:
      APP_ID: com.saucelabs.mydemo.app.ios
      EMAIL: ${EMAIL}
      PASSWORD: ${PASSWORD}

# Assert: Products catalog screen is displayed
- extendedWaitUntil:
    visible:
      text: "Products"
    timeout: 10000
