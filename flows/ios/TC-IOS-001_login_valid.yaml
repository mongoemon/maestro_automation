appId: com.saucelabs.mydemo.app.ios
name: "TC-IOS-001: Login with valid credentials"
tags:
  - ios
  - auth
  - smoke
env:
  IOS_EMAIL: ${IOS_EMAIL}
  PASSWORD: ${PASSWORD}
onFlowStart:
  - takeScreenshot: TC-IOS-001_start
onFlowComplete:
  - takeScreenshot: TC-IOS-001_complete
---
- launchApp:
    clearState: true

- runFlow:
    file: ./subflows/login/login.yaml
    env:
      APP_ID: com.saucelabs.mydemo.app.ios
      IOS_EMAIL: ${IOS_EMAIL}
      PASSWORD: ${PASSWORD}

- runFlow:
    file: ./subflows/products/assert_loaded.yaml
    env:
      APP_ID: com.saucelabs.mydemo.app.ios
