appId: com.saucelabs.mydemo.app.ios
name: "TC-IOS-003: Username field shows error when left empty"
tags:
  - ios
  - auth
  - validation
env:
  PASSWORD: ${PASSWORD}
onFlowStart:
  - takeScreenshot: TC-IOS-003_start
onFlowComplete:
  - takeScreenshot: TC-IOS-003_complete
---
# TC-IOS-003: Username field shows error when left empty
# Precondition: App is installed. User is on the Login screen.
# Test data: email=(empty), password=(empty) — just tap Login
# Expected: "Username is required" error is displayed.

- launchApp:
    clearState: true

- waitForAnimationToEnd

- runFlow:
    file: ./subflows/navigate_to_login.yaml
    env:
      APP_ID: com.saucelabs.mydemo.app.ios

# Leave both fields empty and tap Login (index:1 skips the "Login" page title)
- tapOn:
    text: "Login"
    index: 1

# Assert: Username error message is displayed
- extendedWaitUntil:
    visible:
      text: "Username is required"
    timeout: 5000
