appId: com.saucelabs.mydemo.app.ios
name: "TC-IOS-003: Username field shows error when left empty"
tags:
  - ios
  - auth
  - validation
onFlowStart:
  - takeScreenshot: TC-IOS-003_start
onFlowComplete:
  - takeScreenshot: TC-IOS-003_complete
---
- launchApp:
    clearState: true

- runFlow:
    file: ./subflows/login/navigate.yaml
    env:
      APP_ID: com.saucelabs.mydemo.app.ios

# Leave both fields empty and tap the submit button (index 1 skips the "Login" page title)
- tapOn:
    text: "Login"
    index: 1

- extendedWaitUntil:
    visible:
      text: "Username is required"
    timeout: 5000
